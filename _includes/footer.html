<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN"
  "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="Content-Style-Type" content="text/css">
  <title></title>
  <meta name="Generator" content="Cocoa HTML Writer">
  <meta name="CocoaVersion" content="2566">
  <style type="text/css">
    .footer-row {
      width: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    .footer-left {
      float: left;
      font-size: 10px;
      color: #D3D3D3;
    }
    .footer-right {
      float: right;
      font-size: 10px;
      color: #D3D3D3;
    }
  </style>
</head>
<body>

<div class="footer-row">
  <div class="footer-left">
    Last updated: {{ site.time | date: "%B %d, %Y" }}
  </div>
  <div class="footer-right">
    © {{ site.name | default: site.title }}.
    {{ site.data.ui-text[site.locale].powered_by | default: "Powered by" }}
    <a href="http://jekyllrb.com/">Jekyll</a> &amp;
    <a href="https://github.com/academicpages/academicpages.github.io">AcademicPages</a>,
    a fork of
    <a href="https://mademistakes.com/work/minimal-mistakes-jekyll-theme/">Minimal Mistakes</a>.
  </div>
</div>

</body>
</html>
